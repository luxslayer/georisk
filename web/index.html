<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Mexico Road Risk Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div id="app">

    <header id="top-bar">
      <div id="top-bar-left">
        <span class="logo-icon">◈</span>
        <span class="logo-text">GEORISK <span class="logo-sub">MX</span></span>
      </div>
      <h1 id="main-title">MONITOR DE CARRETERAS</h1>
      <div id="update-info">
        ACTUALIZACIÓN EN <span id="countdown">--:--</span>
      </div>
    </header>

    <div id="layout">

      <!-- Panel izquierdo: carreteras -->
      <aside id="road-panel">
        <div id="panel-header">
          <span class="panel-label">ESTADO DE CARRETERAS</span>
          <span id="incident-total">— incidentes</span>
        </div>
        <div id="road-list"></div>
      </aside>

      <!-- Mapa -->
      <div id="map"></div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="map.js"></script>

</body>
</html>
