name: Update incidents

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v3

    - name: setup python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: install deps
      run: pip install requests

    - name: run script
      run: python scripts/generate_incidents.py

    - name: commit changes
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@github.com"
        git add incidents.json
        git commit -m "update incidents" || echo "no changes"
        git push